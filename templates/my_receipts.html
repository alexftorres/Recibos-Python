<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styleMeusrecibos.css') }}">
    <title>Recibos Online</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #045FB4;">
        <div class="container containerlg">
            <a class="navbar-brand" href="{{ url_for('generate') }}">Recibos Online</a>
            
            <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="navbar-collapse collapse justify-content-md-end" id="navbarMenu">
                <div class="navbar-nav">
                    <a href="{{ url_for('generate') }}" class="nav-item nav-link">Home</a>
                </div>
                <div class="navbar-nav">
                    <a href="{{ url_for('logout') }}" class="nav-item nav-link">
                        <i class="fas fa-sign-out-alt "></i>Sair</a>
                </div>
            </div>
        </div>

    </nav>
    <div class="container">
        <table class="table table-hover table-responsive-sm">
            <thead class="thead-light">
                <tr>
                    <th>Data</th>
                    <th>Pagador</th>
                    <th>Valor</th>
                    <th>Recebedor</th>
                    <th>#</th>
                </tr>
            </thead>
            <tbody>

            
                {% for recibo in recibos %}
                <tr>
                    <td>{{ recibo.dataRecibo.strftime('%d/%m/%Y') }}</td>
                    <td>{{ recibo.pagadorRecibo }}</td>
                    <td>{{ recibo.formatted_valor }}</td>
                    <td>{{ recibo.recebedorRecibo }}</td>
                    <td><a href="{{ url_for('reprint', idrecibo=recibo.idrecibo) }}"><i class="fa fa-print" aria-hidden="true"></i></a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script type="text/javascript" src="{{ url_for('static', filename='script.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='mascara.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='jquery.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>
</body>

</html>
