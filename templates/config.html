<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="{{ url_for('static', filename='ico.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Configurações - Recibos Online</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #045FB4;">
        <div class="container">
        <a class="navbar-brand" href="{{ url_for('generate') }}">Recibos Online</a>


            <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="navbar-collapse collapse justify-content-md-end" id="navbarMenu">
            <div class="navbar-nav">
                <a href="{{ url_for('my_receipts') }}" class="nav-item nav-link">Meus Recibos</a>
            </div>
            <div class="navbar-nav">
                <a href="{{ url_for('config') }}" class="nav-item nav-link">Configurações</a>
            </div>
                <div class="navbar-nav">
                    <a href="{{ url_for('logout') }}" class="nav-item nav-link">
                        <i class="fas fa-sign-out-alt "></i>Sair</a>
                </div>
            </div>
        </div>

    </nav>
    <div class="container">
        <p><h5>Configurações dos Valores Padrão</h5></p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">×</span>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="label" for="recebedor">Recebedor</label>
                <input id="recebedor" type="text" name="recebedor" class="form-control" value="{{ recebedor_default }}" required>
            </div>
            <div class="form-group">
                <label class="label" for="cpf">CPF/CNPJ Recebedor</label>
                <input type="text" name="cpf" id="cpf" class="form-control" value="{{ cpf_recebedor_default }}" required>
            </div>
            <div class="form-group">
                <label class="label" for="telefone">Telefone Recebedor</label>
                <input type="text" name="telefone" id="telefone" class="form-control" value="{{ telefone_recebedor_default }}" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Salvar" class="btn btn-outline-primary">
            </div>
        </form>
    </div>

    <script type="text/javascript" src="{{ url_for('static', filename='jquery.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>
</body>

</html>
