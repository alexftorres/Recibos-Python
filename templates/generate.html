<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="{{ url_for('static', filename='ico.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Recibos Online</title>
    <script type="text/javascript">
        window.onload = function () {
            pegarDataAtual();
        }
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
        <a class="navbar-brand" href="{{ url_for('generate') }}"><i class="fas fa-receipt"></i> Recibos Online</a>


            <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="navbar-collapse collapse justify-content-md-end" id="navbarMenu">
            <div class="navbar-nav">
                <a href="{{ url_for('my_receipts') }}" class="nav-item nav-link"><i class="fas fa-list"></i> Meus Recibos</a>
            </div>
            <div class="navbar-nav">
                <a href="{{ url_for('config') }}" class="nav-item nav-link"><i class="fas fa-cog"></i> Configurações</a>
            </div>
                <div class="navbar-nav">
                    <a href="{{ url_for('logout') }}" class="nav-item nav-link">
                        <i class="fas fa-sign-out-alt "></i>Sair</a>
                </div>
            </div>
        </div>

    </nav>
    <div class="container">
        <p><h5>Preencha o formulário abaixo</h5></p>
        <form method="POST">
            <div class="row">
                <div class="col-lg-6">
                    <label class="label" for="valor">Valor</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text">R$</span>
                        </div>
                        <input id="valor" type="text" name="valor" class="form-control input" onKeyUp="mascaraMoeda(this, event)" placeholder="0,00" autofocus required>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="form-group">
                        <div class="form-group">
                            <label class="label label2" for="data">Data</label>
                            <input id="data" type="date" name="data" class="form-control" required>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="label" for="pagador">Pagador</label>
                <input id="pagador" type="text" name="pagador" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="label" for="docpagador">CPF/CNPJ Pagador</label>
                <input type="text" name="docpagador" id="docpagador" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="label" for="referencia">Referente a</label>
                <input id="referencia" type="text" name="referencia" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="label" for="recebedor">Recebedor</label>
                <input id="recebedor" type="text" name="recebedor" class="form-control" value="{{ recebedor_default }}" required>
            </div>
            <div class="form-group">
                <label class="label" for="docrecebedor">CPF/CNPJ Recebedor</label>
                <input type="text" name="docrecebedor" id="docrecebedor" class="form-control" value="{{ cpf_recebedor_default }}" required>
            </div>
            <div class="form-group">
                <label class="label" for="fonerecebedor">Telefone Recebedor</label>
                <input type="text" name="fonerecebedor" id="fonerecebedor" class="form-control" value="{{ telefone_recebedor_default }}" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Gerar Recibo" class="btn btn-outline-primary">
            </div>
        </form>
    </div>

    <script type="text/javascript" src="{{ url_for('static', filename='script.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='mascara.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='jquery.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.min.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>
</body>

</html>
